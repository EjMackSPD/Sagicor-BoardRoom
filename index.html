<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sagicor BoardRoom Videos</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2303294f'/%3E%3Ccircle cx='25' cy='34' r='11' fill='%2362bb46'/%3E%3Ccircle cx='39' cy='34' r='11' fill='%2386d569'/%3E%3Ccircle cx='32' cy='24' r='11' fill='%23fff'/%3E%3C/svg%3E">
  <style>
    :root {
      --blue-950: #03294f;
      --blue-900: #073763;
      --blue-800: #0b4777;
      --blue-700: #0c5b95;
      --green-500: #62bb46;
      --green-600: #43a047;
      --ink: #10243b;
      --muted: #617085;
      --line: #dce5ee;
      --surface: #ffffff;
      --surface-soft: #f4f8fb;
      --shadow: 0 20px 60px rgba(3, 41, 79, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      min-height: 100%;
      overflow-x: hidden;
      color: var(--ink);
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 92% 12%, rgba(98, 187, 70, 0.16), transparent 28rem),
        linear-gradient(135deg, #f7fbfe 0%, #eef5fa 52%, #ffffff 100%);
    }

    button {
      font: inherit;
    }

    .app {
      min-height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      position: relative;
      isolation: isolate;
      color: #ffffff;
      background:
        linear-gradient(90deg, rgba(3, 41, 79, 0.96), rgba(7, 55, 99, 0.94) 55%, rgba(12, 91, 149, 0.9)),
        linear-gradient(135deg, var(--blue-950), var(--blue-800));
      overflow: hidden;
    }

    .topbar::after {
      content: "";
      position: absolute;
      inset: auto -8vw -38px 48vw;
      height: 96px;
      background: var(--green-500);
      transform: skewX(-24deg);
      opacity: 0.95;
      z-index: -1;
    }

    .masthead {
      width: min(1180px, calc(100vw - 48px));
      min-height: 190px;
      margin: 0 auto;
      padding: 28px 0 34px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 28px;
      align-items: center;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .brand-mark {
      width: 54px;
      height: 54px;
      position: relative;
      flex: 0 0 auto;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.11);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.24);
    }

    .brand-mark span {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 7px 7px 3px 7px;
      background: var(--green-500);
      transform: rotate(45deg);
    }

    .brand-mark span:nth-child(1) {
      top: 10px;
      left: 17px;
      background: #ffffff;
    }

    .brand-mark span:nth-child(2) {
      top: 22px;
      left: 8px;
    }

    .brand-mark span:nth-child(3) {
      top: 22px;
      right: 8px;
      background: #86d569;
    }

    .wordmark {
      margin: 0;
      line-height: 0.9;
      font-size: clamp(44px, 6vw, 76px);
      font-weight: 800;
      letter-spacing: 0;
    }

    .tagline {
      margin: 0 0 0 70px;
      color: rgba(255, 255, 255, 0.86);
      font-size: clamp(15px, 2vw, 22px);
      font-weight: 500;
    }

    .room-label {
      justify-self: end;
      display: grid;
      gap: 8px;
      text-align: right;
    }

    .room-label strong {
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1;
    }

    .room-label span {
      color: rgba(255, 255, 255, 0.78);
      font-size: 16px;
      font-weight: 600;
    }

    main {
      width: min(1180px, calc(100vw - 48px));
      margin: 0 auto;
      padding: 30px 0 34px;
    }

    .library-head {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: end;
      margin-bottom: 20px;
    }

    .library-head h2 {
      margin: 0;
      color: var(--blue-950);
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .library-head p {
      max-width: 450px;
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.45;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .video-card {
      min-height: 100%;
      width: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
      padding: 0;
      border: 1px solid rgba(7, 55, 99, 0.12);
      border-radius: 8px;
      color: inherit;
      background: var(--surface);
      box-shadow: 0 10px 26px rgba(3, 41, 79, 0.08);
      cursor: pointer;
      overflow: hidden;
      text-align: left;
      transform: translateY(16px);
      opacity: 0;
      animation: card-in 520ms ease forwards;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .video-card:nth-child(2) { animation-delay: 50ms; }
    .video-card:nth-child(3) { animation-delay: 100ms; }
    .video-card:nth-child(4) { animation-delay: 150ms; }
    .video-card:nth-child(5) { animation-delay: 200ms; }
    .video-card:nth-child(6) { animation-delay: 250ms; }
    .video-card:nth-child(7) { animation-delay: 300ms; }

    .video-card:hover,
    .video-card:focus-visible {
      border-color: rgba(98, 187, 70, 0.76);
      box-shadow: 0 18px 44px rgba(3, 41, 79, 0.16);
      transform: translateY(-2px);
      outline: none;
    }

    .video-card:active {
      transform: translateY(1px) scale(0.992);
    }

    .thumb {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(3, 41, 79, 0.9), rgba(12, 91, 149, 0.82)),
        linear-gradient(45deg, rgba(98, 187, 70, 0.28), transparent 62%);
    }

    .thumb::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(3, 41, 79, 0.02), rgba(3, 41, 79, 0.46));
      pointer-events: none;
    }

    .thumb video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      opacity: 0;
      transition: opacity 220ms ease;
    }

    .thumb video.is-ready {
      opacity: 1;
    }

    .fallback-icon,
    .play-badge {
      position: absolute;
      display: grid;
      place-items: center;
      border-radius: 999px;
    }

    .fallback-icon {
      inset: 0;
      margin: auto;
      width: 74px;
      height: 74px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.22);
    }

    .fallback-icon::before,
    .play-badge::before,
    .player-play::before {
      content: "";
      width: 0;
      height: 0;
      margin-left: 5px;
      border-top: 13px solid transparent;
      border-bottom: 13px solid transparent;
      border-left: 19px solid #ffffff;
    }

    .play-badge {
      right: 16px;
      bottom: 14px;
      z-index: 1;
      width: 48px;
      height: 48px;
      background: var(--green-500);
      box-shadow: 0 10px 24px rgba(3, 41, 79, 0.28);
    }

    .play-badge::before {
      border-top-width: 9px;
      border-bottom-width: 9px;
      border-left-width: 14px;
      margin-left: 3px;
    }

    .number {
      position: absolute;
      top: 13px;
      left: 14px;
      z-index: 1;
      min-width: 42px;
      height: 34px;
      display: grid;
      place-items: center;
      padding: 0 10px;
      border-radius: 999px;
      color: #ffffff;
      background: rgba(3, 41, 79, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.28);
      font-weight: 800;
      font-size: 14px;
    }

    .meta {
      display: grid;
      gap: 12px;
      padding: 18px;
    }

    .meta h3 {
      min-height: 2.2em;
      margin: 0;
      color: var(--blue-950);
      font-size: clamp(20px, 2.1vw, 25px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .duration {
      color: var(--blue-800);
      white-space: nowrap;
    }

    .player {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      grid-template-rows: auto 1fr auto;
      color: #ffffff;
      background: #020b15;
    }

    .player.is-open {
      display: grid;
    }

    .player-bar {
      min-height: 78px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 16px clamp(18px, 3vw, 34px);
      background: linear-gradient(90deg, rgba(3, 41, 79, 0.95), rgba(7, 55, 99, 0.86));
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .player-title {
      min-width: 0;
    }

    .player-title strong {
      display: block;
      overflow: hidden;
      color: #ffffff;
      font-size: clamp(18px, 2.4vw, 28px);
      line-height: 1.15;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .player-title span {
      color: rgba(255, 255, 255, 0.68);
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .icon-button {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 999px;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.12);
      cursor: pointer;
      transition: background 160ms ease, transform 160ms ease;
    }

    .icon-button:hover,
    .icon-button:focus-visible {
      background: rgba(255, 255, 255, 0.24);
      outline: none;
    }

    .icon-button:active {
      transform: scale(0.96);
    }

    .close-icon,
    .back-icon,
    .next-icon {
      width: 22px;
      height: 22px;
      position: relative;
      display: block;
    }

    .close-icon::before,
    .close-icon::after {
      content: "";
      position: absolute;
      top: 10px;
      left: 1px;
      width: 20px;
      height: 2px;
      border-radius: 4px;
      background: currentColor;
    }

    .close-icon::before { transform: rotate(45deg); }
    .close-icon::after { transform: rotate(-45deg); }

    .back-icon::before,
    .next-icon::before {
      content: "";
      position: absolute;
      top: 3px;
      width: 14px;
      height: 14px;
      border-top: 3px solid currentColor;
      border-left: 3px solid currentColor;
    }

    .back-icon::before {
      left: 5px;
      transform: rotate(-45deg);
    }

    .next-icon::before {
      right: 5px;
      transform: rotate(135deg);
    }

    .screen {
      position: relative;
      min-height: 0;
      display: grid;
      place-items: center;
      background: #020b15;
    }

    .screen video {
      width: 100%;
      height: 100%;
      max-height: calc(100vh - 158px);
      object-fit: contain;
      background: #020b15;
    }

    .player-play {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 88px;
      height: 88px;
      display: none;
      place-items: center;
      border: 0;
      border-radius: 999px;
      background: rgba(98, 187, 70, 0.92);
      transform: translate(-50%, -50%);
      box-shadow: 0 16px 44px rgba(0, 0, 0, 0.32);
      cursor: pointer;
    }

    .player-play.is-visible {
      display: grid;
    }

    .player-play::before {
      border-top-width: 18px;
      border-bottom-width: 18px;
      border-left-width: 26px;
      margin-left: 7px;
    }

    .player-controls {
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 14px 20px;
      background: #020b15;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .control-button {
      min-width: 138px;
      min-height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 0;
      border-radius: 999px;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.12);
      font-weight: 800;
      cursor: pointer;
    }

    .control-button.primary {
      background: var(--green-500);
    }

    .control-button:hover,
    .control-button:focus-visible {
      background: rgba(255, 255, 255, 0.22);
      outline: none;
    }

    .control-button.primary:hover,
    .control-button.primary:focus-visible {
      background: var(--green-600);
    }

    @keyframes card-in {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 900px) {
      .masthead {
        min-height: 164px;
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .room-label {
        justify-self: start;
        text-align: left;
      }

      .tagline {
        margin-left: 0;
      }

      .library-head {
        align-items: start;
        flex-direction: column;
      }

      .video-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      .masthead,
      main {
        width: min(100vw - 28px, 1180px);
      }

      .masthead {
        padding-top: 20px;
      }

      .brand-row {
        gap: 12px;
      }

      .brand-mark {
        width: 46px;
        height: 46px;
      }

      .brand-mark span {
        width: 17px;
        height: 17px;
      }

      .brand-mark span:nth-child(1) {
        top: 9px;
        left: 15px;
      }

      .brand-mark span:nth-child(2) {
        top: 20px;
        left: 8px;
      }

      .brand-mark span:nth-child(3) {
        top: 20px;
        right: 8px;
      }

      .video-grid {
        grid-template-columns: 1fr;
      }

      .player-bar {
        min-height: 72px;
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .player-bar .icon-button:first-child {
        display: none;
      }

      .player-controls {
        gap: 10px;
      }

      .control-button {
        min-width: 0;
        flex: 1 1 0;
        padding: 0 14px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: 1ms !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="masthead">
        <div class="brand" aria-label="Sagicor">
          <div class="brand-row">
            <div class="brand-mark" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <h1 class="wordmark">Sagicor</h1>
          </div>
          <p class="tagline">Wise Financial Thinking for Life</p>
        </div>
        <div class="room-label">
          <strong>BoardRoom Video Library</strong>
          <span>Tap a video to begin</span>
        </div>
      </div>
    </header>

    <main>
      <section class="library-head" aria-labelledby="library-title">
        <h2 id="library-title">Featured videos</h2>
        <p>Local playback for the Surface kiosk. Videos load directly from this folder.</p>
      </section>

      <section class="video-grid" id="videoGrid" aria-label="Video list"></section>
    </main>
  </div>

  <section class="player" id="player" aria-label="Video player" aria-hidden="true">
    <div class="player-bar">
      <button class="icon-button" type="button" id="backButton" aria-label="Back to library">
        <span class="back-icon" aria-hidden="true"></span>
      </button>
      <div class="player-title">
        <span id="playerNumber">Video</span>
        <strong id="playerTitle">Selected video</strong>
      </div>
      <button class="icon-button" type="button" id="closeButton" aria-label="Close video">
        <span class="close-icon" aria-hidden="true"></span>
      </button>
    </div>

    <div class="screen">
      <video id="activeVideo" controls playsinline></video>
      <button class="player-play" id="centerPlayButton" type="button" aria-label="Play video"></button>
    </div>

    <div class="player-controls">
      <button class="control-button" type="button" id="previousButton">
        <span class="back-icon" aria-hidden="true"></span>
        Previous
      </button>
      <button class="control-button primary" type="button" id="replayButton">Replay</button>
      <button class="control-button" type="button" id="nextButton">
        Next
        <span class="next-icon" aria-hidden="true"></span>
      </button>
    </div>
  </section>

  <script>
    const videos = [
      { file: "1 - Sagicor RND and Fraud - D2.mp4", title: "RND and Fraud" },
      { file: "2 - Sagicor KNOWS - D2.mp4", title: "Sagicor KNOWS" },
      { file: "3 - Sagicor MIMO - D2.mp4", title: "MIMO" },
      { file: "4 - Sagicor eApp - D2.mp4", title: "eApp" },
      { file: "5 - Sagicor eForms - D2.mp4", title: "eForms" },
      { file: "6 - Sagicor Client Web Disbursement - D2.mp4", title: "Client Web Disbursement" },
      { file: "7 - Sagicor Pre-Authorization - D2.mp4", title: "Pre-Authorization" }
    ];

    const grid = document.getElementById("videoGrid");
    const player = document.getElementById("player");
    const activeVideo = document.getElementById("activeVideo");
    const playerTitle = document.getElementById("playerTitle");
    const playerNumber = document.getElementById("playerNumber");
    const closeButton = document.getElementById("closeButton");
    const backButton = document.getElementById("backButton");
    const previousButton = document.getElementById("previousButton");
    const replayButton = document.getElementById("replayButton");
    const nextButton = document.getElementById("nextButton");
    const centerPlayButton = document.getElementById("centerPlayButton");

    let currentIndex = 0;
    let lastFocusedCard = null;

    function formatDuration(seconds) {
      if (!Number.isFinite(seconds)) return "Ready";
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60).toString().padStart(2, "0");
      return `${mins}:${secs}`;
    }

    function videoPath(file) {
      return encodeURI(file);
    }

    function createCard(item, index) {
      const card = document.createElement("button");
      card.className = "video-card";
      card.type = "button";
      card.setAttribute("aria-label", `Play ${item.title}`);
      card.addEventListener("click", () => openVideo(index, card));

      const thumb = document.createElement("div");
      thumb.className = "thumb";

      const preview = document.createElement("video");
      preview.muted = true;
      preview.playsInline = true;
      preview.preload = "metadata";
      preview.src = videoPath(item.file);
      preview.addEventListener("loadedmetadata", () => {
        const seekTo = Math.min(1.2, Math.max(0.15, preview.duration * 0.05));
        preview.currentTime = seekTo;
      });
      preview.addEventListener("seeked", () => preview.classList.add("is-ready"), { once: true });
      preview.addEventListener("loadeddata", () => preview.classList.add("is-ready"), { once: true });

      const fallback = document.createElement("span");
      fallback.className = "fallback-icon";
      fallback.setAttribute("aria-hidden", "true");

      const badge = document.createElement("span");
      badge.className = "play-badge";
      badge.setAttribute("aria-hidden", "true");

      const number = document.createElement("span");
      number.className = "number";
      number.textContent = String(index + 1).padStart(2, "0");

      thumb.append(preview, fallback, number, badge);

      const meta = document.createElement("div");
      meta.className = "meta";

      const title = document.createElement("h3");
      title.textContent = item.title;

      const metaRow = document.createElement("div");
      metaRow.className = "meta-row";

      const label = document.createElement("span");
      label.textContent = "Video";

      const duration = document.createElement("span");
      duration.className = "duration";
      duration.textContent = "Loading";
      preview.addEventListener("loadedmetadata", () => {
        duration.textContent = formatDuration(preview.duration);
      });

      metaRow.append(label, duration);
      meta.append(title, metaRow);
      card.append(thumb, meta);
      return card;
    }

    function openVideo(index, sourceCard) {
      currentIndex = index;
      lastFocusedCard = sourceCard || document.activeElement;
      const item = videos[currentIndex];
      playerTitle.textContent = item.title;
      playerNumber.textContent = `Video ${String(currentIndex + 1).padStart(2, "0")} of ${videos.length}`;
      activeVideo.src = videoPath(item.file);
      activeVideo.load();
      player.classList.add("is-open");
      player.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
      centerPlayButton.classList.add("is-visible");
      activeVideo.play().then(() => {
        centerPlayButton.classList.remove("is-visible");
      }).catch(() => {
        centerPlayButton.classList.add("is-visible");
      });
      closeButton.focus({ preventScroll: true });
    }

    function closePlayer() {
      activeVideo.pause();
      activeVideo.removeAttribute("src");
      activeVideo.load();
      player.classList.remove("is-open");
      player.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
      centerPlayButton.classList.remove("is-visible");
      if (lastFocusedCard && typeof lastFocusedCard.focus === "function") {
        lastFocusedCard.focus({ preventScroll: true });
      }
    }

    function showOffset(offset) {
      const nextIndex = (currentIndex + offset + videos.length) % videos.length;
      openVideo(nextIndex, grid.children[nextIndex]);
    }

    videos.forEach((item, index) => grid.append(createCard(item, index)));

    closeButton.addEventListener("click", closePlayer);
    backButton.addEventListener("click", closePlayer);
    previousButton.addEventListener("click", () => showOffset(-1));
    nextButton.addEventListener("click", () => showOffset(1));
    replayButton.addEventListener("click", () => {
      activeVideo.currentTime = 0;
      activeVideo.play();
    });
    centerPlayButton.addEventListener("click", () => activeVideo.play());
    activeVideo.addEventListener("play", () => centerPlayButton.classList.remove("is-visible"));
    activeVideo.addEventListener("pause", () => centerPlayButton.classList.add("is-visible"));
    activeVideo.addEventListener("ended", () => centerPlayButton.classList.add("is-visible"));

    document.addEventListener("keydown", (event) => {
      if (!player.classList.contains("is-open")) return;
      if (event.key === "Escape") closePlayer();
      if (event.key === "ArrowLeft") showOffset(-1);
      if (event.key === "ArrowRight") showOffset(1);
    });
  </script>
</body>
</html>
